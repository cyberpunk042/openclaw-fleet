# Agent Hooks — per-role structural enforcement via Claude Code hooks
#
# Hooks fire on lifecycle events (PreToolUse, PostToolUse, SessionStart, etc.)
# and enforce behavior structurally — the agent cannot bypass them.
#
# This config drives: scripts/configure-agent-settings.sh
# The script reads this file and writes hooks into each agent's
# .claude/settings.json alongside permissions and effort.
#
# Hook types:
#   command — runs a shell command. Exit code 0=allow, 1=warn, 2=block
#   http — POSTs payload to URL (async, non-blocking)
#
# Sources:
#   tools-system-directives-and-usage.md (Type 7: hook directives)
#   strategic-agent-capabilities-research.md (hook monitoring)
#   fleet-elevation/20-ai-behavior.md (anti-corruption Line 1)
#
# Plugins provide additional hooks:
#   security-guidance: 9 PreToolUse patterns (devsecops)
#   safety-net: destructive command detection (all agents)
#   superpowers: SessionStart skill injection (agents with superpowers)

# ─── Default Hooks (all agents) ───────────────────────────────────────

defaults:
  PreToolUse:
    # Conventional commit format enforcement
    - matcher: "fleet_commit"
      type: command
      command: |
        echo "$TOOL_INPUT" | python3 -c "
        import sys, json
        data = json.load(sys.stdin)
        msg = data.get('message', '')
        import re
        pattern = r'^(feat|fix|refactor|test|docs|chore|ci|style|perf)\(.+\): .+ \[task:[a-f0-9]{8}\]$'
        if not re.match(pattern, msg):
            print('Commit message does not match conventional format.')
            print('Expected: type(scope): description [task:XXXXXXXX]')
            print(f'Got: {msg}')
            sys.exit(2)  # block
        "
      description: "Enforce conventional commit format on fleet_commit"

    # Completion without progress — warn if agent completes without ever reporting progress.
    # Fleet-ops needs progress trail to do a meaningful review. Completing "out of nowhere"
    # means the review has no context about what happened during work.
    - matcher: "fleet_task_complete"
      type: command
      command: |
        TRAIL_LOG="${FLEET_DIR:-.}/.fleet-trail.log"
        if [[ -f "$TRAIL_LOG" ]]; then
          AGENT="${FLEET_AGENT:-unknown}"
          if grep -q "fleet_task_progress.*$AGENT" "$TRAIL_LOG" 2>/dev/null; then
            exit 0  # progress was reported
          fi
          if grep -q "fleet_commit.*$AGENT" "$TRAIL_LOG" 2>/dev/null; then
            exit 0  # commits exist — work trail present
          fi
        fi
        echo "Warning: No progress reports or commits found in trail for this session."
        echo "Fleet-ops reviews without context. Consider fleet_task_progress before completing."
        exit 1  # warn
      description: "Warn if completing without prior progress reports or commits"

  PostToolUse:
    # Trail recording — every state-modifying tool call gets a trail event
    # This ensures trail completeness even if individual tools forget to record
    - matcher: "fleet_task_complete|fleet_commit|fleet_approve|fleet_contribute|fleet_task_accept"
      type: command
      command: |
        echo "trail:$(date -Iseconds):$TOOL_NAME:${FLEET_AGENT:-unknown}" >> "${FLEET_DIR:-.}/.fleet-trail.log"
      description: "Record trail events for state-modifying tool calls"

# ─── Role-Specific Hooks ──────────────────────────────────────────────

roles:
  software-engineer:
    PreToolUse:
      # Prevent completing without running tests
      - matcher: "fleet_task_complete"
        type: command
        command: |
          # Check if tests were run in this session by looking at recent trail
          TRAIL_LOG="${FLEET_DIR:-.}/.fleet-trail.log"
          if [[ -f "$TRAIL_LOG" ]]; then
            TASK_SHORT="${FLEET_TASK_ID:0:8}"
            if grep -q "pytest\|test_" "$TRAIL_LOG" 2>/dev/null; then
              exit 0  # tests were run
            fi
          fi
          echo "Warning: No test execution detected in this session."
          echo "Run tests before completing: .venv/bin/python -m pytest fleet/tests/ -v"
          exit 1  # warn but don't block (exit 2 would block)
        description: "Warn if completing without running tests"

  fleet-ops:
    PreToolUse:
      # Prevent rubber-stamp approvals — require meaningful comment
      - matcher: "fleet_approve"
        type: command
        command: |
          echo "$TOOL_INPUT" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          comment = data.get('comment', '')
          decision = data.get('decision', '')
          if decision == 'approved' and len(comment) < 20:
              print('Approval comment too short. Fleet-ops must provide specific feedback.')
              print('Explain WHAT was verified, not just \"looks good\".')
              sys.exit(2)  # block
          if decision == 'rejected' and len(comment) < 30:
              print('Rejection must include specific feedback: what failed, what to fix.')
              sys.exit(2)  # block
          "
        description: "Enforce meaningful review comments on approvals/rejections"

  devsecops-expert:
    PreToolUse:
      # Security-hold check — warn before approving tasks with active security_hold
      - matcher: "fleet_approve"
        type: command
        command: |
          echo "$TOOL_INPUT" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          # This is a structural reminder — the MCP tool also checks
          print('Reminder: verify security_hold is cleared before approving.')
          sys.exit(0)  # allow — the tool itself enforces the actual check
          "
        description: "Remind to verify security_hold before approval"

  project-manager:
    PreToolUse:
      # Task creation field completeness — prevent bad dispatch from missing fields
      # Missing story_points = wrong model selection. Missing agent_name = unassigned.
      # Missing task_stage = wrong methodology protocol. These cascade into 5 systems.
      - matcher: "fleet_task_create"
        type: command
        command: |
          echo "$TOOL_INPUT" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          missing = []
          # title is required by the tool itself
          if not data.get('agent_name'):
              missing.append('agent_name (who does this?)')
          if not data.get('task_type'):
              missing.append('task_type (epic/story/task/subtask)')
          # Warn but don't block — PM may be creating contribution subtasks
          # where some fields are inferred
          if missing:
              print('Task creation missing recommended fields:')
              for m in missing:
                  print(f'  - {m}')
              print('Missing fields degrade dispatch quality, model selection, and contributions.')
              sys.exit(1)  # warn
          "
        description: "Warn PM when creating tasks without key fields that affect dispatch"

  architect:
    PreToolUse:
      # Design input should reference specific files — vague design degrades implementation
      - matcher: "fleet_contribute"
        type: command
        command: |
          echo "$TOOL_INPUT" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          ctype = data.get('contribution_type', '')
          content = data.get('content', '')
          if ctype == 'design_input':
              # Check for file path patterns (at least one specific reference)
              import re
              has_file_ref = bool(re.search(r'[a-zA-Z_/]+\.(py|ts|js|yaml|yml|json|md|sh)', content))
              has_dir_ref = bool(re.search(r'[a-zA-Z_]+/', content))
              if not has_file_ref and not has_dir_ref:
                  print('Design input has no file or directory references.')
                  print('Engineers need SPECIFIC target files to implement your design.')
                  print('Include at least: target files, modified files, or directory scope.')
                  sys.exit(1)  # warn
          "
        description: "Warn if design_input contribution lacks specific file references"

  qa-engineer:
    PreToolUse:
      # QA predefinition should use TC-XXX format — the validation system depends on it
      - matcher: "fleet_contribute"
        type: command
        command: |
          echo "$TOOL_INPUT" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          ctype = data.get('contribution_type', '')
          content = data.get('content', '')
          if ctype == 'qa_test_definition':
              if 'TC-' not in content and 'tc-' not in content:
                  print('QA test definition should use structured TC-XXX format.')
                  print('Example: TC-001: API returns 200 for valid input | unit | required')
                  print('TC-XXX criteria become validation checkpoints during review.')
                  sys.exit(1)  # warn
          "
        description: "Warn if QA test definition lacks structured TC-XXX criteria"

  devops:
    PreToolUse:
      # IaC principle — warn if committing infrastructure changes without script reference
      - matcher: "fleet_commit"
        type: command
        command: |
          echo "$TOOL_INPUT" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          files = data.get('files', [])
          infra_files = [f for f in files if any(p in f for p in ['Dockerfile', 'docker-compose', '.github/workflows', 'scripts/'])]
          msg = data.get('message', '')
          if infra_files and not any(t in msg for t in ['ci', 'chore', 'docs']):
              if 'feat' in msg or 'fix' in msg:
                  print('Infrastructure files modified with feat/fix commit.')
                  print(f'Files: {infra_files[:3]}')
                  print('If this changes deployment behavior, verify with: make status')
                  sys.exit(1)  # warn
          "
        description: "Warn when committing infrastructure files to verify deployment behavior"

  ux-designer:
    PreToolUse:
      # UX specs should address states and accessibility — the two things engineers skip
      - matcher: "fleet_contribute"
        type: command
        command: |
          echo "$TOOL_INPUT" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          ctype = data.get('contribution_type', '')
          content = data.get('content', '').lower()
          if ctype == 'ux_spec':
              issues = []
              if 'state' not in content and 'loading' not in content and 'empty' not in content and 'error' not in content:
                  issues.append('No states defined (loading, empty, error, success)')
              if 'accessib' not in content and 'keyboard' not in content and 'screen reader' not in content and 'wcag' not in content:
                  issues.append('No accessibility requirements')
              if issues:
                  print('UX spec missing critical elements:')
                  for i in issues:
                      print(f'  - {i}')
                  print('Engineers will skip what you do not specify.')
                  sys.exit(1)  # warn
          "
        description: "Warn if ux_spec contribution lacks states or accessibility requirements"

  accountability-generator:
    PreToolUse:
      # Compliance alerts should include evidence — not vague claims
      - matcher: "fleet_alert"
        type: command
        command: |
          echo "$TOOL_INPUT" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          category = data.get('category', '')
          details = data.get('details', '')
          if category == 'compliance' and len(details) < 50:
              print('Compliance alert has insufficient detail.')
              print('Include: what was checked, what was found, evidence (task IDs, counts).')
              sys.exit(1)  # warn
          "
        description: "Warn if compliance alerts lack sufficient evidence detail"

