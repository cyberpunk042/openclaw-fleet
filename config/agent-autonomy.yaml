# Agent Autonomy — Per-role lifecycle thresholds and wake triggers
#
# This config drives agent_lifecycle.py behavior.
# Each role gets tuned thresholds for sleep/wake transitions.
#
# Rectified 2026-04-01: No DROWSY state. After 1 HEARTBEAT_OK the brain
# takes over evaluation (silent heartbeat). Cron never stops.
# States: ACTIVE → IDLE → SLEEPING → OFFLINE

defaults:
  idle_after_heartbeat_ok: 1       # 1 HEARTBEAT_OK → brain takes over (silent)
  sleeping_after_seconds: 1800     # 30 min idle → SLEEPING (longer cron interval)
  offline_after_seconds: 14400     # 4 hours sleeping → OFFLINE

overrides:
  project-manager:
    wake_triggers:
      - unassigned_inbox           # always wake for unassigned tasks
      - po_directive               # PO commands are highest priority
      - blocked_task               # PM resolves blockers

  fleet-ops:
    wake_triggers:
      - pending_approval           # core job: review work
      - security_alert             # security is urgent
      - storm_warning              # storm needs attention
      - health_alert               # fleet health issues

  devsecops-expert:
    wake_triggers:
      - security_alert             # immediate
      - pr_created                 # review every PR for security
      - dependency_vulnerability   # CVE alerts
      - crisis_mode                # crisis = devsecops active

  architect:
    wake_triggers:
      - design_review_needed       # tasks needing architecture input
      - high_complexity_task       # complex tasks need architect
      - po_directive

  # All other agents (workers) use defaults
  # Workers are dispatched TO — they don't need fast wake
  # They wake when tasks are assigned, which the orchestrator handles
