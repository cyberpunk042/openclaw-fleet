# Agent Tooling — Per-role MCP servers, plugins, skills
#
# This config drives:
#   scripts/setup-agent-tools.sh  — deploy per-agent mcp.json
#   scripts/install-plugins.sh    — install per-agent plugins
#   scripts/setup-claude-mem.sh   — deploy per-agent memory
#   scripts/setup-lightrag.sh     — knowledge graph setup
#
# MCP servers: command-based (fleet, lightrag) or npx-based (filesystem, github, etc)
# Plugins: installed via claude plugin install
# Skills: assigned from .claude/skills/ per role
# System tools: expected to be available on the system

defaults:
  mcp_servers:
    - name: fleet
      command: "{{FLEET_VENV}}/bin/python"
      args: ["-m", "fleet.mcp.server"]
      env:
        FLEET_DIR: "{{FLEET_DIR}}"
        FLEET_AGENT: "{{AGENT_NAME}}"
    - name: lightrag
      command: "python"
      args: ["-m", "daniel_lightrag_mcp"]
      env:
        LIGHTRAG_BASE_URL: "http://localhost:9621"
        LIGHTRAG_API_KEY: ""
  plugins:
    - claude-mem          # cross-session memory (SQLite-only mode for WSL2)
    - safety-net          # PreToolUse hook catches destructive commands
  skills:
    - fleet-communicate   # ALL agents: communication surface guide (IRC/ntfy/board/Plane)

agents:
  architect:
    mcp_servers:
      - name: filesystem
        package: "@modelcontextprotocol/server-filesystem"
        args: ["{{WORKSPACE}}"]
      - name: github
        package: "@modelcontextprotocol/server-github"
    plugins:
      - context7              # library/framework documentation
      - superpowers           # TDD, writing-plans, brainstorming, systematic-debugging (132K stars)
      - adversarial-spec      # multi-LLM debate for spec refinement (518 stars)
    skills:
      - architecture-propose
      - architecture-review
      - scaffold
      - feature-plan
      - refactor-architecture

  software-engineer:
    mcp_servers:
      - name: filesystem
        package: "@modelcontextprotocol/server-filesystem"
        args: ["{{WORKSPACE}}"]
      - name: github
        package: "@modelcontextprotocol/server-github"
      - name: playwright
        package: "@playwright/mcp@latest"
      - name: pytest-mcp
        command: "python"
        args: ["-m", "pytest_mcp_server"]
    plugins:
      - context7
      - superpowers           # TDD, systematic-debugging, verification (132K stars)
      - pyright-lsp           # Python type error detection
    skills:
      - feature-implement
      - feature-plan
      - feature-test
      - refactor-extract
      - refactor-split
      - foundation-deps
      - quality-lint

  qa-engineer:
    mcp_servers:
      - name: filesystem
        package: "@modelcontextprotocol/server-filesystem"
        args: ["{{WORKSPACE}}"]
      - name: playwright
        package: "@playwright/mcp@latest"
      - name: pytest-mcp
        command: "python"
        args: ["-m", "pytest_mcp_server"]
    plugins:
      - superpowers           # TDD, systematic-debugging (132K stars)
    skills:
      - quality-coverage
      - quality-audit
      - quality-lint
      - quality-debt
      - foundation-testing
      - feature-test
      - feature-review
      - fleet-test

  devops:
    mcp_servers:
      - name: filesystem
        package: "@modelcontextprotocol/server-filesystem"
        args: ["{{WORKSPACE}}"]
      - name: github
        package: "@modelcontextprotocol/server-github"
      - name: docker
        package: "@modelcontextprotocol/server-docker"
      - name: github-actions
        package: "github-actions-mcp-server"
    plugins:
      - hookify               # natural-language hook creation (official Anthropic)
      - commit-commands        # git commit workflows (official Anthropic)
    skills:
      - foundation-docker
      - foundation-ci
      - foundation-config
      - ops-deploy
      - ops-rollback
      - ops-incident
      - ops-backup
      - ops-maintenance
      - config-deploy
      - infra-monitoring

  devsecops-expert:
    mcp_servers:
      - name: filesystem
        package: "@modelcontextprotocol/server-filesystem"
        args: ["{{WORKSPACE}}"]
      - name: docker
        package: "@modelcontextprotocol/server-docker"
      - name: semgrep
        command: "semgrep"
        args: ["--mcp"]
        # Semgrep: 30+ languages, custom rules, free tier. Most flexible security scanner.
    plugins:
      - security-guidance      # 9 security patterns via hooks (official Anthropic)
      - sage                   # Agent Detection and Response — ADR (162 stars)
    skills:
      - infra-security
      - quality-audit
      - config-secrets
      - foundation-auth
      - fleet-security-audit

  fleet-ops:
    mcp_servers:
      - name: github
        package: "@modelcontextprotocol/server-github"
    plugins:
      - pr-review-toolkit      # 5 parallel Sonnet review agents (official Anthropic)
    skills:
      - pm-assess
      - quality-audit
      - fleet-review
      - openclaw-health
      - openclaw-fleet-status
      - openclaw-setup
      - openclaw-add-agent
      - scaffold-subagent

  project-manager:
    mcp_servers:
      - name: github
        package: "@modelcontextprotocol/server-github"
      - name: plane
        package: "makeplane/plane-mcp-server"
        # Official Plane MCP: issues, cycles, modules. Replaces direct API calls.
    plugins:
      - plannotator            # visual plan/diff annotation, team feedback (4K stars)
    skills:
      - pm-plan
      - pm-assess
      - pm-status-report
      - pm-retrospective
      - pm-changelog
      - pm-handoff
      - idea-capture
      - feature-plan
      - fleet-plan
      - fleet-sprint
      - fleet-plane

  technical-writer:
    mcp_servers:
      - name: filesystem
        package: "@modelcontextprotocol/server-filesystem"
        args: ["{{WORKSPACE}}"]
      - name: github
        package: "@modelcontextprotocol/server-github"
    plugins:
      - context7              # library/framework documentation for accurate writing
      - ars-contexta          # knowledge systems from conversation (3K stars)
    skills:
      - feature-document
      - pm-changelog
      - pm-handoff
      - quality-debt

  ux-designer:
    mcp_servers:
      - name: filesystem
        package: "@modelcontextprotocol/server-filesystem"
        args: ["{{WORKSPACE}}"]
      - name: playwright
        package: "@playwright/mcp@latest"
    plugins: []
    skills:
      - quality-accessibility

  accountability-generator:
    mcp_servers:
      - name: filesystem
        package: "@modelcontextprotocol/server-filesystem"
        args: ["{{WORKSPACE}}"]
    plugins: []
    skills:
      - quality-audit
      - quality-debt
      - quality-coverage
      - pm-status-report
