agents_dir: agents
fleet:
  name: openclaw-fleet
  version: 0.1.0
gateway:
  claude_model: opus
  default_mode: think
  port: 9400
mission_control:
  enabled: true
  url: http://localhost:8000
notifications:
  ntfy:
    topics:
      alert: fleet-alert
      progress: fleet-progress
      review: fleet-review
    url: http://192.168.40.11:10222
  windows:
    enabled: false
    only_urgent: true
orchestrator:
  budget_mode: turbo
  driver_agents:
  - project-manager
  - fleet-ops
  driver_heartbeat_interval: 600
  dry_run: false
  max_concurrent_per_agent: 1
  max_dispatch_per_cycle: 2
