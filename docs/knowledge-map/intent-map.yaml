# Intent Map — Situation → What to Inject
#
# Part of: Fleet Knowledge Map → Metadata layer
# Purpose: The brain reads this to determine WHAT content from the
#   knowledge map to inject into agent context for a given situation.
#
# Format: Each intent defines a situation (role + stage + context)
#   and maps it to specific content from the map branches.
#
# The navigator module reads this at context assembly time.

# ─── Injection Profile Selection ────────────────────────────────────
#
# Profile selected based on model + context window:
#   opus-1m:    Full detail — all sections, complete manuals
#   sonnet-200k: Condensed — key concepts, essential sections
#   localai-8k:  Minimal — names only, action directive, essentials
#   heartbeat:   Just enough for idle check (role data + fleet state)

profiles:
  opus-1m:
    system_manuals: full         # docs/systems/*.md
    agent_manual: condensed      # agent-manuals.md (mission + tools, full identity in SOUL.md/CLAUDE.md)
    methodology: full            # methodology-manual.md (full stage)
    standards: full              # standards-manual.md (relevant standard)
    module_manual: condensed     # module-manuals.md (relevant modules)
    skills: full_descriptions    # all assigned skills with descriptions
    commands: full_guidance      # all commands with per-role per-stage guidance
    tools: full_chains           # full tool call trees
    plugins: full_capabilities   # all plugin capabilities
    hooks: awareness             # hook behavior described
    contributions: full          # synergy matrix + received + missing
    trail: full                  # trail events for task
    context_awareness: full      # both countdowns + aggregate math

  sonnet-200k:
    system_manuals: condensed    # system-manuals-condensed.md
    agent_manual: condensed      # mission + tools + key rules
    methodology: full            # methodology is ALWAYS full (critical)
    standards: required_fields   # field list only, no quality criteria
    module_manual: none          # not needed at this context size
    skills: names_only           # /skill-name list
    commands: key_per_stage      # top 3 commands for current stage
    tools: names_and_purpose     # tool name + one-line purpose
    plugins: names_only          # plugin names
    hooks: none                  # not needed
    contributions: received_only # what's been received, not full matrix
    trail: summary               # key events only
    context_awareness: both_pcts # just the two percentages

  localai-8k:
    system_manuals: none
    agent_manual: minimal        # mission (1 line) + core responsibility
    methodology: stage_only      # current stage MUST/MUST NOT only
    standards: none
    module_manual: none
    skills: none                 # agent knows skills from CLAUDE.md
    commands: none               # agent knows commands from CLAUDE.md
    tools: fleet_read_context    # "call fleet_read_context for more detail"
    plugins: none
    hooks: none
    contributions: names_only    # "design_input received from architect"
    trail: none
    context_awareness: none

  heartbeat:
    system_manuals: none
    agent_manual: none           # identity comes from IDENTITY.md (static)
    methodology: none            # stage comes from task-context.md
    standards: none
    module_manual: none
    skills: none
    commands: none
    tools: none
    plugins: none
    hooks: none
    contributions: none
    trail: none
    context_awareness: none
    # Heartbeat gets: fleet state + directives + messages + tasks + role data
    # All from fleet-context.md (written by brain every 30s)

# ─── Per-Role Per-Stage Intents ─────────────────────────────────────

intents:

  # ── Project Manager ──────────────────────────────────────────────

  pm-conversation:
    inject:
      - agent_manual: pm (mission + tools + rules)
      - methodology: conversation (MUST/MUST NOT)
      - skills: [idea-capture, fleet-communicate, fleet-po-communication]
      - pack_skills: [superpowers:brainstorming]
      - commands: [/context]
      - contributions: none (PM doesn't receive contributions)

  pm-reasoning:
    inject:
      - agent_manual: pm
      - methodology: reasoning
      - skills: [pm-plan, fleet-plan, fleet-sprint, fleet-epic-breakdown, fleet-sprint-planning]
      - pack_skills: [superpowers:writing-plans, superpowers:brainstorming, ring:pre-dev-task-breakdown, ring:pre-dev-delivery-planning]
      - commands: [/plan, /context, /cost]
      - tools: [fleet_task_create, fleet_gate_request]
      - sub_agents: [sprint-analyzer]

  pm-work:
    inject:
      - agent_manual: pm
      - methodology: work
      - skills: [fleet-sprint, fleet-plane, pm-status-report, fleet-stage-progression]
      - pack_skills: [superpowers:executing-plans]
      - commands: [/cost, /usage]
      - tools: [fleet_task_create, fleet_gate_request, fleet_plane_*]
      - sub_agents: [sprint-analyzer]

  pm-heartbeat:
    inject:
      - fleet_state: [work_mode, cycle_phase, budget_mode]
      - role_data: [unassigned_count, blocked_count, sprint_progress]
      - directives: all
      - messages: mentions
      - tasks: assigned
      - sub_agents: [sprint-analyzer]

  # ── Fleet-Ops ────────────────────────────────────────────────────

  fleet-ops-review:
    inject:
      - agent_manual: fleet-ops (7-step review)
      - standards: [completion_claim, pull_request]
      - skills: [fleet-review, fleet-ops-review-protocol, fleet-methodology-compliance, fleet-quality-enforcement, fleet-test]
      - pack_skills: [superpowers:verification-before-completion, ring:code-reviewer, ring:security-reviewer, ring:test-reviewer]
      - commands: [/diff, /pr-comments, /security-review]
      - tools: [fleet_approve, fleet_alert]
      - trail: task trail (for Step 4 trail verification)
      - contributions: received for task (verify used)
      - challenge: challenge results if available
      - sub_agents: [trail-reconstructor]

  fleet-ops-heartbeat:
    inject:
      - fleet_state: all
      - role_data: [pending_approvals, review_queue, offline_agents]
      - directives: all
      - messages: mentions
      - health: [storm_status, budget_status, agent_health]
      - sub_agents: [trail-reconstructor]

  # ── Architect ────────────────────────────────────────────────────

  architect-conversation:
    inject:
      - agent_manual: architect
      - methodology: conversation (MUST/MUST NOT)
      - skills: [fleet-communicate]
      - pack_skills: [superpowers:brainstorming, superpowers:preserving-productive-tensions]
      - note: "Clarify design requirements. Understand constraints. NO design yet."

  architect-analysis:
    inject:
      - agent_manual: architect
      - methodology: analysis
      - skills: [architecture-review, fleet-architecture-health, fleet-domain-boundary-enforcement]
      - pack_skills: [superpowers:systematic-debugging, superpowers:brainstorming]
      - commands: [/context, /plan, /diff]
      - tools: [fleet_artifact_create (analysis_document)]
      - mcp: [filesystem, github, Context7]
      - sub_agents: [pattern-analyzer, dependency-mapper, code-explorer]

  architect-investigation:
    inject:
      - agent_manual: architect
      - methodology: investigation
      - skills: [fleet-option-exploration, architecture-review]
      - pack_skills: [superpowers:brainstorming, superpowers:dispatching-parallel-agents]
      - commands: [/plan, /context]
      - tools: [fleet_artifact_create (investigation_document)]
      - mcp: [filesystem, github, Context7]
      - sub_agents: [pattern-analyzer, code-explorer]
      - note: "minimum 3 options explored"

  architect-reasoning:
    inject:
      - agent_manual: architect
      - methodology: reasoning
      - skills: [architecture-propose, fleet-design-pattern-selection, fleet-srp-verification, fleet-adr-creation]
      - pack_skills: [superpowers:writing-plans, superpowers:brainstorming, neolabhq:ddd, neolabhq:sadd, neolabhq:sdd]
      - commands: [/plan, /branch, /effort high]
      - tools: [fleet_task_accept, fleet_artifact_create (plan)]
      - mcp: [filesystem, Context7, sequential-thinking]
      - sub_agents: [pattern-analyzer, dependency-mapper]

  architect-contribution:
    inject:
      - agent_manual: architect (contribution role)
      - skills: [fleet-design-contribution]
      - tools: [fleet_contribute (design_input)]
      - target_task: full context of task being contributed to
      - standards: for contribution artifact type
      - sub_agents: [code-explorer]

  architect-heartbeat:
    inject:
      - fleet_state: [work_mode]
      - role_data: [tasks_needing_design, complexity_flags, architecture_decisions]
      - directives: all
      - messages: mentions
      - tasks: assigned
      - sub_agents: [pattern-analyzer, dependency-mapper, code-explorer]

  # ── DevSecOps ────────────────────────────────────────────────────

  devsecops-analysis:
    inject:
      - agent_manual: devsecops
      - methodology: analysis
      - skills: [fleet-vulnerability-assessment, fleet-threat-modeling]
      - pack_skills: [superpowers:systematic-debugging, trailofbits:openai-security-threat-model, trailofbits:openai-security-ownership-map]
      - tools: [fleet_artifact_create (security_assessment)]
      - mcp: [filesystem, docker, semgrep]
      - sub_agents: [dependency-scanner, security-auditor]

  devsecops-investigation:
    inject:
      - agent_manual: devsecops
      - methodology: investigation
      - skills: [fleet-security-audit, fleet-dependency-audit, infra-security]
      - pack_skills: [superpowers:systematic-debugging, superpowers:dispatching-parallel-agents, trailofbits:security-awareness]
      - commands: [/security-review, /debug]
      - mcp: [filesystem, docker, semgrep]
      - sub_agents: [dependency-scanner, secret-detector, security-auditor]

  devsecops-reasoning:
    inject:
      - agent_manual: devsecops
      - methodology: reasoning
      - skills: [fleet-incident-response, fleet-security-contribution]
      - pack_skills: [superpowers:writing-plans]
      - tools: [fleet_task_accept]
      - note: "Plan security fix. Phase-appropriate: POC basic, production hardened."

  devsecops-contribution:
    inject:
      - agent_manual: devsecops (security layer)
      - skills: [fleet-security-contribution]
      - tools: [fleet_contribute (security_requirement)]
      - target_task: full context
      - sub_agents: [security-auditor]
      - note: "phase-appropriate — POC basic, production full"

  devsecops-work:
    inject:
      - agent_manual: devsecops (full)
      - methodology: work
      - skills: [fleet-incident-response, fleet-secret-scanning, fleet-dependency-audit]
      - pack_skills: [superpowers:systematic-debugging, superpowers:verification-before-completion, superpowers:test-driven-development, trailofbits:security-awareness]
      - tools: [fleet_commit, fleet_task_complete, fleet_alert]
      - mcp: [filesystem, docker, semgrep]
      - sub_agents: [dependency-scanner, secret-detector, security-auditor]

  devsecops-review:
    inject:
      - skills: [fleet-security-compliance]
      - pack_skills: [superpowers:verification-before-completion]
      - tools: [fleet_alert (security), security_hold mechanism]
      - commands: [/security-review]
      - mcp: [semgrep]
      - sub_agents: [security-auditor]

  devsecops-heartbeat:
    inject:
      - fleet_state: [work_mode, storm_status]
      - role_data: [security_alerts, prs_needing_review, infra_health]
      - directives: all
      - messages: mentions
      - tasks: assigned
      - sub_agents: [dependency-scanner, secret-detector, security-auditor]

  # ── Software Engineer ────────────────────────────────────────────

  engineer-conversation:
    inject:
      - agent_manual: engineer
      - methodology: conversation (MUST/MUST NOT)
      - skills: [fleet-communicate]
      - pack_skills: [superpowers:brainstorming]
      - note: "Clarify requirements. Ask specific questions. NO code."

  engineer-analysis:
    inject:
      - agent_manual: engineer
      - methodology: analysis
      - skills: [fleet-code-exploration]
      - pack_skills: [superpowers:systematic-debugging, superpowers:brainstorming]
      - tools: [fleet_artifact_create (analysis_document)]
      - mcp: [filesystem, github, context7]
      - sub_agents: [code-explorer]
      - note: "Examine codebase. Reference specific files. NO solutions."

  engineer-investigation:
    inject:
      - agent_manual: engineer
      - methodology: investigation
      - skills: [fleet-option-exploration, fleet-code-exploration]
      - pack_skills: [superpowers:brainstorming, superpowers:dispatching-parallel-agents]
      - tools: [fleet_artifact_create (investigation_document)]
      - mcp: [filesystem, github, context7]
      - sub_agents: [code-explorer]
      - note: "Research multiple approaches. Not just the first one."

  engineer-reasoning:
    inject:
      - agent_manual: engineer
      - methodology: reasoning
      - skills: [feature-plan, fleet-implementation-planning]
      - pack_skills: [superpowers:writing-plans, superpowers:brainstorming]
      - commands: [/plan]
      - tools: [fleet_task_accept]
      - contributions: check for architect/QA/devsecops inputs
      - note: "do NOT start implementing — plan only"

  engineer-work:
    inject:
      - agent_manual: engineer (full — this is their primary stage)
      - methodology: work (full MUST/MUST NOT)
      - skills: [fleet-engineer-workflow, fleet-contribution-consumption, fleet-conventional-commits, fleet-completion-checklist]
      - pack_skills: [superpowers:test-driven-development, superpowers:verification-before-completion, superpowers:systematic-debugging, superpowers:subagent-driven-development, ring:dev-implementation, ring:dev-unit-testing]
      - commands: [/debug, /diff, /fast, /compact, /batch]
      - tools: [fleet_read_context, fleet_task_accept, fleet_commit, fleet_task_complete]
      - mcp: [filesystem, github, playwright, context7]
      - contributions: all received (architect design, QA tests, devsecops security)
      - standards: [plan, pull_request, completion_claim]
      - context_awareness: both countdowns
      - sub_agents: [test-runner, code-explorer]

  engineer-heartbeat:
    inject:
      - fleet_state: [work_mode, backend_mode]
      - role_data: [assigned_tasks, artifact_state, contributions_received]
      - directives: all
      - messages: mentions
      - tasks: assigned with stage and readiness
      - sub_agents: [test-runner, code-explorer]

  # ── DevOps ───────────────────────────────────────────────────────

  devops-analysis:
    inject:
      - agent_manual: devops
      - methodology: analysis
      - skills: [fleet-fleet-infrastructure, fleet-docker-management]
      - pack_skills: [superpowers:systematic-debugging, ring:dev-sre]
      - tools: [fleet_artifact_create (infrastructure_assessment)]
      - mcp: [filesystem, docker, github-actions]
      - sub_agents: [container-inspector]

  devops-reasoning:
    inject:
      - agent_manual: devops
      - methodology: reasoning
      - skills: [fleet-deployment-strategy, fleet-monitoring-setup, fleet-devops-iac]
      - pack_skills: [superpowers:writing-plans, superpowers:brainstorming, ring:dev-docker-security, ring:dev-helm]
      - tools: [fleet_task_accept]
      - note: "Plan IaC changes. Everything scriptable. Everything reproducible."

  devops-work:
    inject:
      - agent_manual: devops
      - methodology: work
      - skills: [fleet-devops-iac, fleet-docker-management, fleet-cicd-pipeline, fleet-rollback-procedures]
      - pack_skills: [superpowers:verification-before-completion, superpowers:systematic-debugging, ring:dev-docker-security]
      - commands: [/debug, /loop, /batch]
      - tools: [fleet_commit, fleet_task_complete, fleet_contribute]
      - mcp: [filesystem, github, docker]
      - sub_agents: [container-inspector]
      - note: "everything MUST be IaC — no manual runtime commands"

  devops-contribution:
    inject:
      - agent_manual: devops (deployment role)
      - skills: [fleet-deployment-strategy, fleet-phase-infrastructure-maturity]
      - tools: [fleet_contribute (deployment_manifest)]
      - target_task: full context
      - note: "Environment, config, deploy strategy, monitoring, rollback plan"

  devops-heartbeat:
    inject:
      - fleet_state: [work_mode, backend_mode]
      - role_data: [infra_tasks, service_health, deployment_state]
      - directives: all
      - messages: mentions
      - tasks: assigned
      - sub_agents: [container-inspector]

  # ── QA Engineer ──────────────────────────────────────────────────

  qa-contribution:
    inject:
      - agent_manual: qa (test predefinition)
      - skills: [fleet-qa-predefinition, fleet-test-contribution-protocol, fleet-boundary-value-analysis]
      - tools: [fleet_contribute (qa_test_definition)]
      - target_task: full context
      - standards: qa_test_definition artifact type
      - note: "structured test criteria with IDs (TC-001)"

  qa-work:
    inject:
      - agent_manual: qa
      - methodology: work
      - skills: [fleet-regression-testing, fleet-integration-testing, fleet-phase-testing]
      - pack_skills: [superpowers:test-driven-development, superpowers:testing-anti-patterns, superpowers:verification-before-completion, ring:test-reviewer]
      - commands: [/debug]
      - tools: [fleet_commit, fleet_task_complete]
      - mcp: [filesystem, playwright]
      - sub_agents: [test-runner, regression-checker, coverage-analyzer]

  qa-review:
    inject:
      - agent_manual: qa (validation role)
      - skills: [fleet-test-validation, fleet-acceptance-criteria-quality]
      - pack_skills: [superpowers:verification-before-completion]
      - tools: [fleet-test skill]
      - predefined_criteria: qa_test_definition for this task
      - sub_agents: [test-runner, regression-checker]
      - note: "validate against YOUR predefined criteria, not discovered ones"

  qa-heartbeat:
    inject:
      - fleet_state: [work_mode]
      - role_data: [contribution_tasks, review_tasks, coverage_metrics]
      - directives: all
      - messages: mentions
      - tasks: assigned
      - sub_agents: [test-runner, regression-checker, coverage-analyzer]

  # ── Technical Writer ─────────────────────────────────────────────

  writer-work:
    inject:
      - agent_manual: writer
      - methodology: work
      - skills: [fleet-doc-lifecycle, fleet-documentation-structure, fleet-changelog-generation, fleet-terminology-consistency]
      - pack_skills: [superpowers:writing-plans, ring:writing-api-docs, ring:writing-functional-docs, ring:documentation-structure]
      - commands: [/plan, /compact]
      - tools: [fleet_artifact_create, fleet_commit, fleet_plane_*]
      - mcp: [filesystem, github, context7]
      - note: "documentation is a LIVING SYSTEM — update or delete, never leave stale"

  writer-contribution:
    inject:
      - skills: [fleet-doc-contribution-protocol]
      - tools: [fleet_contribute (documentation_outline)]
      - target_task: full context

  writer-heartbeat:
    inject:
      - fleet_state: [work_mode]
      - role_data: [doc_tasks, completed_features_without_docs, stale_pages]
      - directives: all
      - messages: mentions
      - tasks: assigned

  writer-heartbeat-autonomous:
    inject:
      - role_data: [completed_tasks_without_docs, stale_plane_pages]
      - tools: [fleet_plane_*, fleet_commit]
      - note: "scan for missing/stale docs, update proactively"

  # ── UX Designer ──────────────────────────────────────────────────

  ux-analysis:
    inject:
      - agent_manual: ux
      - methodology: analysis
      - skills: [fleet-ux-every-level, fleet-accessibility-audit]
      - pack_skills: [superpowers:brainstorming]
      - tools: [fleet_artifact_create (ux_assessment)]
      - mcp: [filesystem, playwright]
      - note: "Analyze UX at ALL levels — CLI, API, errors, config, not just UI."

  ux-contribution:
    inject:
      - agent_manual: ux
      - skills: [fleet-ux-contribution-protocol, fleet-component-patterns]
      - pack_skills: [superpowers:brainstorming]
      - tools: [fleet_contribute (ux_spec)]
      - target_task: full context
      - note: "specify ALL states — loading, error, empty, success, partial"

  ux-reasoning:
    inject:
      - agent_manual: ux
      - methodology: reasoning
      - skills: [fleet-interaction-design, quality-accessibility]
      - pack_skills: [superpowers:writing-plans, superpowers:brainstorming]
      - commands: [/plan, /branch]
      - mcp: [filesystem, playwright]

  ux-heartbeat:
    inject:
      - fleet_state: [work_mode]
      - role_data: [contribution_tasks, ux_review_tasks]
      - directives: all
      - messages: mentions
      - tasks: assigned

  # ── Accountability Generator ─────────────────────────────────────

  accountability-analysis:
    inject:
      - agent_manual: accountability
      - skills: [fleet-accountability-trail, fleet-compliance-verification, fleet-trail-verification]
      - pack_skills: [superpowers:verification-before-completion]
      - tools: [fleet_artifact_create (compliance_report)]
      - trail: all trail events for reporting period
      - standards: methodology compliance metrics
      - sub_agents: [trail-reconstructor]
      - note: "verify every detail — reconstruct trails event by event"

  accountability-work:
    inject:
      - agent_manual: accountability
      - methodology: work
      - skills: [fleet-compliance-reporting, fleet-compliance-verification, fleet-pattern-detection]
      - pack_skills: [superpowers:verification-before-completion, borghei:soc2-compliance-expert, borghei:nist-csf-specialist]
      - tools: [fleet_artifact_create (compliance_report), fleet_alert]
      - sub_agents: [trail-reconstructor]

  accountability-heartbeat:
    inject:
      - fleet_state: [work_mode]
      - role_data: [completed_tasks (need trail verification)]
      - directives: all
      - messages: mentions
      - trail: recent completions
      - sub_agents: [trail-reconstructor]
      - note: "sprint boundary → generate compliance report"
