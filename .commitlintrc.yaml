extends:
  - '@commitlint/config-conventional'

rules:
  type-enum:
    - 2
    - always
    - - feat
      - fix
      - docs
      - refactor
      - test
      - chore
      - ci
      - style
      - perf
  scope-case:
    - 2
    - always
    - lower-case
  subject-case:
    - 2
    - always
    - - lower-case
      - sentence-case
  header-max-length:
    - 2
    - always
    - 100
  body-max-line-length:
    - 1
    - always
    - 200